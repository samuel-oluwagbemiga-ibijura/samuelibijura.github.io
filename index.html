<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samuel O. Ibijura | Information Security & GRC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #f1f5f9;
  --ink-mid: #cbd5e1;
  --ink-muted: #94a3b8;
  --ink-faint: #64748b;
  --paper: #0b0f19;
  --paper-warm: #131a2e;
  --rule: #1e293b;
  --green: #4ade80;
  --green-light: #064e3b;
  --green-mid: #2ecc71;
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.65; }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 6%; background: var(--paper); border-bottom: 1px solid var(--rule); }
.nav-name { font-family: var(--serif); font-size: 17px; color: var(--ink); }
.nav-links { display: flex; gap: 28px; }
.nav-links a { font-size: 13px; color: var(--ink-muted); text-decoration: none; transition: color .15s; }
.nav-links a:hover { color: var(--ink); }
#hero { padding: 130px 6% 80px; max-width: 960px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 60px; align-items: start; }
.hero-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; color: var(--green); background: var(--green-light); padding: 5px 12px; border-radius: 3px; margin-bottom: 22px; letter-spacing: .03em; }
.hero-tag::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
h1 { font-family: var(--serif); font-size: clamp(38px, 5vw, 58px); line-height: 1.08; letter-spacing: -.02em; margin-bottom: 8px; }
h1 em { font-style: italic; color: var(--green); }
.hero-role { font-size: 13px; color: var(--ink-muted); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 24px; }
.hero-bio { font-size: 16px; color: var(--ink-mid); line-height: 1.75; max-width: 480px; margin-bottom: 32px; }
.hero-bio strong { color: var(--ink); font-weight: 500; }
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 4px; text-decoration: none; transition: all .15s; border: 1px solid transparent; }
.btn-dark { background: var(--ink); color: var(--paper); } .btn-dark:hover { background: #e2e8f0; }
.btn-outline { background: transparent; color: var(--ink); border-color: var(--rule); } .btn-outline:hover { border-color: var(--ink-muted); }
.sidebar-card { background: var(--paper-warm); border: 1px solid var(--rule); border-radius: 6px; overflow: hidden; }
.sidebar-header { padding: 14px 18px; border-bottom: 1px solid var(--rule); font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-muted); }
.s-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--rule); }
.s-item:last-child { border-bottom: none; }
.s-icon { width: 30px; height: 30px; flex-shrink: 0; background: var(--paper); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.s-name { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.s-meta { font-size: 11px; color: var(--ink-muted); margin-top: 1px; }
.s-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 2px; margin-top: 4px; }
.b-blue { background: #1e3a8a; color: #bfdbfe; }
.b-green { background: var(--green-light); color: var(--green); }
.b-amber { background: #7c2d12; color: #fed7aa; }
.rule { border: none; border-top: 1px solid var(--rule); margin: 0; }
.section { padding: 72px 0; width: 100%; }
